<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Editavel</title>
</head>
<body>
    <header>
        <h1>Seu Perfil</h1>
    </header>

    <main>
        <section class="perfil" id="cor_perfil">
            <section>
                <img src="imagens/perfil_placeholder.png" alt="Imagem placeholder para perfil">
            </section>

            <section class="informacoes_perfil">
                <p><strong>Nome: </strong> <span id="nome_user">Usuario Sem Nome</span></p>
                <p><strong>Email: </strong> <span id="email_user">Usuario Sem Email</span></p>
                <p id="descricao_user">Adicione sua descrição aqui</p>
            </section>
        </section>
        
        <section class="botoes_perfil">
            <button id="botao_nome">Altere seu nome</button>
            <button id="botao_email">Altere seu email</button>
            <button id="botao_descricao">Altere sua descrição</button>
            <button id="botao_cor">Altere a cor do seu perfil</button>
        </section>
    </main>

    <footer>

    </footer>
    <script src="java.js"></script>
</body>
</html>
